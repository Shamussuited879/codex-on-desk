name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS arm64
            runner: macos-15
            npm_script: dist:mac
            npm_args: --arm64 --publish never
            artifact_name: codex-on-desk-macos-arm64
            artifact_paths: |
              release/*-arm64.dmg
              release/*-arm64-mac.zip
              release/*-arm64.dmg.blockmap
              release/*-arm64-mac.zip.blockmap
          - name: macOS x64
            runner: macos-15-intel
            npm_script: dist:mac
            npm_args: --x64 --publish never
            artifact_name: codex-on-desk-macos-x64
            artifact_paths: |
              release/*-x64.dmg
              release/*-x64-mac.zip
              release/*-x64.dmg.blockmap
              release/*-x64-mac.zip.blockmap
          - name: Windows x64
            runner: windows-latest
            npm_script: dist:win
            npm_args: --x64 --publish never
            artifact_name: codex-on-desk-windows
            artifact_paths: |
              release/*.exe
              release/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Desktop Package
        run: npm run ${{ matrix.platform.npm_script }} -- ${{ matrix.platform.npm_args }}

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.artifact_paths }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Desktop Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: codex-on-desk-*
          path: release-assets
          merge-multiple: true

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.exe
